<ion-header [translucent]="true">
  <ion-toolbar color="secondary">
    <ion-title>Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="ion-margin">
    <strong>Details of this course :</strong>
    <ion-grid>
      <ion-row>
        <ion-col size="6" offset="3">
          <ion-img [src]="selectedCourse.logo"></ion-img>
        </ion-col>
      </ion-row>
    </ion-grid>
    <h2 class="ion-text-center ion-margin-vertical">
      {{ selectedCourse.title }} by {{ selectedCourse.author }}
    </h2>
    <strong>Content of this course :</strong>
    <ion-list>
      @for (keyword of selectedCourse.keywords; track $index) {
      <ion-item>
        <ion-label> {{ keyword }} </ion-label>
      </ion-item>

      }
    </ion-list>
  </div>
</ion-content>
